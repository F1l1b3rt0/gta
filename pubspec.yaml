name: gta
description: "App de Gestión de Turnos y Asistencia"
publish_to: 'none'

version: 1.0.0+1
environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  flutter_dotenv: ^6.0.1
  cupertino_icons: ^1.0.8
  audioplayers: ^6.0.0
  device_preview: ^1.3.1
  crypto: ^3.0.3
  supabase_flutter: ^2.5.6
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.0
  geolocator: ^11.0.0
  intl: ^0.20.0
  shared_preferences: ^2.2.0
  provider: ^6.1.2
  image_picker: ^1.0.5
  excel: ^4.0.0
  share_plus: ^7.0.0
  flutter_local_notifications: ^17.0.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/portada.png"